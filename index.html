<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Begin</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #FDF2F2;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container a {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      cursor: pointer;
    }

    .text {
      font-size: 48px;
      margin-bottom: 10px;
      font-family: 'mynerve';
      color: #3933FA;
    }

    img {
      width: 350px;
      height: auto;
      transform: rotate(50deg) translateX(50px);
    }

    @font-face {
      font-family: 'mynerve';
      src: url('fonts/Mynerve-Regular.ttf') format('truetype');
    }
  </style>
</head>

<body>
  <div class="container">
    <a href="rotting.html">
      <div class="text">click me</div>
      <img src="images/indexstrawberryedit.png" alt="strawberry">
    </a>
  </div>
</body>
</html>
